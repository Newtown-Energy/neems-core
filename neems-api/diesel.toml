# For documentation on how to configure this file,
# see https://diesel.rs/guides/configuring-diesel-cli

[print_schema]
file = "src/schema.rs"
custom_type_derives = ["diesel::query_builder::QueryId", "Clone"]
# print-schema regenerates schema.rs from the live DB on every
# `diesel migration run`. SQLite reports the sites.latitude/longitude
# columns (declared DOUBLE PRECISION) with REAL affinity, so diesel-cli
# infers `Float` for them — but the Rust Site model uses f64, which maps
# to `Double`. Without this patch the post-migration build fails with
# trait-bound errors. The patch rewrites those two columns back to Double.
patch_file = "src/schema.patch"

[migrations_directory]
dir = "migrations"